<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulário de Teste</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 1.6rem;
      color: #2d2d2d;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: #888;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    label {
      display: block;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s;
      color: #333;
      margin-bottom: 24px;
      background: #fafafa;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      background: white;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.92; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.95rem;
      display: none;
    }

    .msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .msg.error   { background: #fce4ec; color: #c62828; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📋 Formulário de Teste</h1>
    <p class="subtitle">Preencha os campos abaixo e envie</p>

    <label for="nome">Seu Nome</label>
    <input type="text" id="nome" placeholder="Digite seu nome..." />

    <label for="opcao">Escolha uma Opção</label>
    <select id="opcao">
      <option value="">Carregando opções...</option>
    </select>

    <button id="btnEnviar" onclick="enviar()">Enviar</button>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbzklTw0R9fv8d1ExgfQ93VqKFP7Hq0GqHtJUB_7XUiryKneFHXykMaNeUs-bOsaRD9M/exec";

    // Carrega opções do Sheets ao abrir a página
    async function carregarOpcoes() {
      try {
        const res = await fetch(`${API}?action=getOptions`);
        const data = await res.json();
        const sel = document.getElementById("opcao");
        sel.innerHTML = '<option value="">Selecione...</option>';
        data.options.forEach(op => {
          const opt = document.createElement("option");
          opt.value = op;
          opt.textContent = op;
          sel.appendChild(opt);
        });
      } catch {
        document.getElementById("opcao").innerHTML =
          '<option value="">Erro ao carregar</option>';
      }
    }

    // Envia dados para o Sheets
    async function enviar() {
      const nome  = document.getElementById("nome").value.trim();
      const opcao = document.getElementById("opcao").value;
      const msg   = document.getElementById("msg");
      const btn   = document.getElementById("btnEnviar");

      msg.className = "msg";
      msg.style.display = "none";

      if (!nome || !opcao) {
        msg.textContent = "⚠️ Preencha todos os campos antes de enviar.";
        msg.className = "msg error";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Enviando...";

      try {
        await fetch(API, {
          method: "POST",
          body: JSON.stringify({ nome, opcao })
        });
        msg.textContent = "✅ Enviado com sucesso! Obrigado.";
        msg.className = "msg success";
        document.getElementById("nome").value = "";
        document.getElementById("opcao").value = "";
      } catch {
        msg.textContent = "❌ Erro ao enviar. Tente novamente.";
        msg.className = "msg error";
      } finally {
        btn.disabled = false;
        btn.textContent = "Enviar";
      }
    }

    carregarOpcoes();
  </script>
</body>
</html>
